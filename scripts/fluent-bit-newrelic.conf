[SERVICE]
    Flush              1
    Daemon             Off
    Log_Level          info

[INPUT]
    Name               tail
    Path               logs/*.jsonl
    Tag                wintermute.logs
    DB                 logs/fluent-bit-tail.db
    DB.Sync            Normal
    Read_from_Head     On
    Skip_Long_Lines    On
    Rotate_Wait        30
    Refresh_Interval   2
    Parser             json

[FILTER]
    Name               modify
    Match              wintermute.logs
    Add                project ${WINTERMUTE_PROJECT}
    Add                source wintermute-jsonl

[OUTPUT]
    Name               http
    Match              wintermute.logs
    Host               log-api.newrelic.com
    Port               443
    URI                /log/v1
    Header             Api-Key ${NEW_RELIC_LICENSE_KEY}
    Header             Content-Type application/json
    Format             json
    Json_date_key      timestamp
    Json_date_format   iso8601
    tls                On
    tls.verify         On
